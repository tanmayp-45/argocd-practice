apiVersion: batch/v1
kind: Job
metadata:
  name: pre-sync-check
  namespace: sync-waves-demo
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      containers:
      - name: check
        image: busybox
        command: ["sh", "-c", "echo 'Pre-sync check passed!' && sleep 5"]
      restartPolicy: Never
  backoffLimit: 1
